# =============================================================================
# Traefik Dashboard
# URL:  https://traefik.timenexahr.com/dashboard/
# Also: https://traefik.timenexahr.com → redirects to /dashboard/
# Auth: BasicAuth (timenexasuperuser / T!g3rFlank)
# Port 4000 still works for LAN direct access (same auth required)
# =============================================================================

http:
  middlewares:
    to-dashboard:
      redirectRegex:
        regex: "^https?://([^/]+)(:[0-9]+)?/?$"
        replacement: "https://$1/dashboard/"
        permanent: true

    dashboard-auth:
      basicAuth:
        users:
          - "timenexasuperuser:$2y$05$57wqqDCLXJ9DNbMrFzmI1ezQqO8Tf2hKu6stdRCMcQawkvCNAKHy6"
        realm: "Traefik Dashboard"

  routers:
    # Primary: dashboard on port 443 (websecure) — publicly reachable, auth required
    traefik-dashboard:
      rule: "Host(`traefik.timenexahr.com`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      entryPoints: ["websecure"]
      service: api@internal
      middlewares: ["dashboard-auth", "security-headers"]
      tls:
        certResolver: le

    traefik-root-redirect:
      rule: "Host(`traefik.timenexahr.com`)"
      entryPoints: ["websecure"]
      service: noop@internal
      middlewares: ["to-dashboard"]
      tls:
        certResolver: le
      priority: 1

    # Secondary: dashboard on port 4000 (LAN direct), same auth
    traefik-dashboard-4000:
      rule: "Host(`traefik.timenexahr.com`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))"
      entryPoints: ["traefik"]
      service: api@internal
      middlewares: ["dashboard-auth", "security-headers"]
      tls:
        certResolver: le

    traefik-root-redirect-4000:
      rule: "Host(`traefik.timenexahr.com`)"
      entryPoints: ["traefik"]
      service: noop@internal
      middlewares: ["to-dashboard"]
      tls:
        certResolver: le
      priority: 1
